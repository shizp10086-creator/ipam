# FreeRADIUS SQL 模块配置
# 读取 IPAM 系统的 MySQL 数据库进行认证
#
# 工作原理：
# 1. 华为交换机收到终端 802.1X/MAC 认证请求
# 2. 交换机将请求转发给 FreeRADIUS（UDP 1812）
# 3. FreeRADIUS 查询 IPAM 数据库中的 radius_users 表验证用户名/密码
# 4. 认证通过后，从 radius_reply 表读取授权属性（VLAN/ACL）下发给交换机
# 5. IPAM 后端 API 管理 radius_users/radius_reply 表的数据

sql {
    driver = "rlm_sql_mysql"

    server = "mysql"
    port = 3306
    login = "ipam"
    password = "ipam_password"

    radius_db = "ipam_db"

    # 认证查询：从 radius_users 表验证用户名密码
    authorize_check_query = "\
        SELECT id, username, 'Cleartext-Password' AS attribute, \
               password AS value, ':=' AS op \
        FROM radius_users \
        WHERE username = '%{SQL-User-Name}' \
          AND is_active = 1"

    # 授权回复：从 radius_reply 表读取下发属性（VLAN/ACL 等）
    authorize_reply_query = "\
        SELECT id, username, attribute, value, op \
        FROM radius_reply \
        WHERE username = '%{SQL-User-Name}' \
          AND is_active = 1"

    # MAC 认证查询：从 radius_mac_auth 表验证 MAC 地址
    authorize_group_check_query = "\
        SELECT id, mac_address AS username, 'Cleartext-Password' AS attribute, \
               mac_address AS value, ':=' AS op \
        FROM radius_mac_auth \
        WHERE mac_address = '%{SQL-User-Name}' \
          AND is_active = 1"

    # 计费记录：写入 radius_accounting 表
    accounting_start_query = "\
        INSERT INTO radius_accounting \
            (session_id, username, mac_address, ip_address, nas_ip, nas_port, \
             start_time, status) \
        VALUES \
            ('%{Acct-Session-Id}', '%{SQL-User-Name}', '%{Calling-Station-Id}', \
             '%{Framed-IP-Address}', '%{NAS-IP-Address}', '%{NAS-Port}', \
             NOW(), 'start')"

    accounting_stop_query = "\
        UPDATE radius_accounting \
        SET stop_time = NOW(), \
            session_time = '%{Acct-Session-Time}', \
            input_octets = '%{Acct-Input-Octets}', \
            output_octets = '%{Acct-Output-Octets}', \
            status = 'stop' \
        WHERE session_id = '%{Acct-Session-Id}'"

    # 认证日志：写入 radius_auth_log 表
    postauth_query = "\
        INSERT INTO radius_auth_log \
            (username, mac_address, ip_address, nas_ip, nas_port, \
             auth_result, reply_message, auth_time) \
        VALUES \
            ('%{SQL-User-Name}', '%{Calling-Station-Id}', \
             '%{Framed-IP-Address}', '%{NAS-IP-Address}', '%{NAS-Port}', \
             '%{reply:Packet-Type}', '%{reply:Reply-Message}', NOW())"

    # 连接池
    pool {
        start = 5
        min = 4
        max = 32
        spare = 3
        uses = 0
        lifetime = 0
        idle_timeout = 60
    }
}
