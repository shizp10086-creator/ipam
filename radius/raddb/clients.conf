# FreeRADIUS 客户端配置
# 注意：启用了 SQL 动态客户端（read_clients = yes），
# NAS 设备从 radius_nas_devices 表动态读取，无需在此文件手动添加。
# 此文件仅保留本地测试和 Docker 网络的静态配置。

client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    shortname = localhost
}

# Docker 内部网络（开发/测试环境）
client docker-network {
    ipaddr = 172.0.0.0/8
    secret = ipam_radius_secret
    shortname = docker
}

# 生产环境：NAS 设备从数据库动态加载
# 在 IPAM 系统中注册 NAS 设备后，FreeRADIUS 自动识别
# 无需修改此文件，无需重启
