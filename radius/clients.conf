# FreeRADIUS 客户端配置（NAS 设备）
#
# 每台华为交换机/无线 AC 都需要在这里注册为 RADIUS 客户端。
# IPAM 系统通过 API 管理这个配置文件，新增设备时自动追加。
#
# 注意：修改此文件后需要重启 FreeRADIUS 容器生效。
# 后续可改为 SQL 动态客户端（无需重启）。

# 允许本地测试
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    shortname = localhost
}

# 允许 Docker 网络内的所有设备（开发环境）
client docker-network {
    ipaddr = 172.18.0.0/16
    secret = ipam_radius_secret
    shortname = docker
}

